<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigShield AI</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            background: white;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #2e8df7;
        }

        .header-buttons button {
            margin-left: 10px;
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid #2e8df7;
            background: white;
            color: #2e8df7;
            cursor: pointer;
        }

        /* MAIN */
        .main {
            text-align: center;
            padding: 30px;
        }

        .title {
            font-size: 30px;
            font-weight: bold;
        }

        .highlight {
            color: #2e8df7;
        }

        /* BADGES */
        .badges {
            margin: 20px 0;
        }

        .badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            margin: 5px;
            font-size: 13px;
        }

        .green { background: #e8f5e9; color: green; }
        .orange { background: #fff3e0; color: orange; }

        /* FORM CARD */
        .form-card {
            background: white;
            width: 420px;
            margin: auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* INPUT */
        .input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        /* ROW */
        .row {
            display: flex;
            gap: 10px;
        }

        /* BUTTON */
        .btn {
            width: 100%;
            padding: 12px;
            background: #ff5722;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 16px;
            cursor: pointer;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">GigShield AI</div>
    <div class="header-buttons">
        <button>Claim Assistance</button>
        <button>Talk to Expert</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="title">
        Protect your <span class="highlight">Weekly Income</span>
    </div>

    <div class="badges">
        <span class="badge green">✔ AI Risk Pricing</span>
        <span class="badge orange">✔ Smart Payout</span>
    </div>

    <!-- FORM -->
    <div class="form-card">

        <input class="input" type="text" placeholder="Full Name" id="name">

        <input class="input" type="tel" placeholder="Phone Number" id="phone">

        <select class="input" id="platform">
            <option value="">Select Delivery Platform</option>
            <option>Swiggy</option>
            <option>Zomato</option>
            <option>Amazon</option>
            <option>Flipkart</option>
        </select>

        <input class="input" type="text" placeholder="Operating City / Zone" id="location">

        <div class="row">
            <input class="input" type="number" placeholder="Hours/Day" id="hours">
            <input class="input" type="number" placeholder="Weekly Earnings ₹" id="earnings">
        </div>

        <button class="btn" onclick="submitForm()">View Plans</button>

        <p style="font-size:12px; margin-top:10px;">
            By continuing, you agree to Terms & Conditions
        </p>

    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    Built for delivery partners across India 🇮🇳
</div>

<script>
    function submitForm() {

        let name = document.getElementById("name").value;
        let phone = document.getElementById("phone").value;

        if (name === "" || phone === "") {
            alert("Please fill all required fields");
            return;
        }

        if (phone.length !== 10) {
            alert("Enter valid 10-digit number");
            return;
        }

        alert("Data submitted successfully!");
    }
</script>

</body>
</html>
